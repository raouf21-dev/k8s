apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app-deployment
  labels:
    app: java-app
spec:
  replicas: 2
  selector:
    matchLabels:     
      app: java-app
  template:
    metadata:
      labels:
        app: java-app
    spec:
      containers:
        - name: javamysqlapp
          image: santana20095/demo-java-app:1.1
          ports:
            - containerPort: 8080
          env: 
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: db_user
            - name: DB_PWD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: db_pwd
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: db_name
            - name: DB_SERVER
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: DB_SERVER
            # - name: DB_PORT
            #   valueFrom:
            #     secretKeyRef:
            #       name: db-secret
            #       key: db_port

      imagePullSecrets:
        - name: regcred

---

apiVersion: v1
kind: Service
metadata:
  name: java-app-service
spec:
  selector:
    app: java-app
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080

